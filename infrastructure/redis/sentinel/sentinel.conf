# Redis Sentinel 配置文件
# Redis Sentinel 用于高可用性，监控 Redis 主从复制

# Sentinel 端口
port 26379

# 守护进程模式（Docker 中设为 no）
daemonize no

# PID 文件
pidfile /var/run/redis-sentinel.pid

# 日志文件（stdout 表示输出到标准输出）
logfile ""

# 工作目录
dir /tmp

# 监控的 Redis 主节点
# 格式：sentinel monitor <master-name> <ip> <port> <quorum>
# quorum: 需要多少 sentinel 同意才能判定主节点失效
sentinel monitor mymaster redis-master 6379 2

# 主节点密码（如果设置了密码）
# sentinel auth-pass mymaster <password>

# 主观下线时间（毫秒）
# 如果 sentinel 在指定时间内无法与主节点通信，判定为主观下线
sentinel down-after-milliseconds mymaster 5000

# 故障转移超时时间（毫秒）
sentinel failover-timeout mymaster 10000

# 并行同步的从节点数量
# 在故障转移期间，最多同时同步多少个从节点
sentinel parallel-syncs mymaster 1

# 通知脚本（可选）
# sentinel notification-script mymaster /var/redis/notify.sh

# 客户端重新配置脚本（可选）
# sentinel client-reconfig-script mymaster /var/redis/reconfig.sh

# 保护模式
protected-mode no

# Sentinel 也支持日志级别配置
loglevel notice












































