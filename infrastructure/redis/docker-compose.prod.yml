# Redis 生产环境配置覆盖
# 使用方式：docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  redis:
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"  # 生产环境只绑定本地
    volumes:
      - redis-data:/data
      - ./config/redis.prod.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G












































