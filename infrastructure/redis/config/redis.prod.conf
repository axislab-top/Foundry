# Redis 生产环境配置文件
# 基于主配置文件，针对生产环境优化

# ==================== 网络配置 ====================

# 生产环境只绑定本地接口
bind 127.0.0.1

# 启用保护模式
protected-mode yes

# ==================== 持久化配置 ====================

# 生产环境启用 RDB 快照
save 900 1
save 300 10
save 60 10000

# 启用 AOF
appendonly yes

# AOF 同步策略：每秒同步（平衡性能和安全）
appendfsync everysec

# ==================== 内存管理 ====================

# 生产环境根据实际情况设置（通过环境变量）
# maxmemory 4gb

# 内存淘汰策略：过期键的 LRU
maxmemory-policy volatile-lru

# ==================== 日志配置 ====================

# 生产环境使用警告级别日志
loglevel warning

# ==================== 安全配置 ====================

# 生产环境必须设置密码（通过命令行参数设置）
# requirepass ${REDIS_PASSWORD}

# 生产环境禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN_SAFE
rename-command DEBUG ""

# ==================== 性能优化 ====================

# 生产环境使用默认 HZ（10）
hz 10

# 启用动态 HZ
dynamic-hz yes

# ==================== 慢查询监控 ====================

# 记录超过 10ms 的查询
slowlog-log-slower-than 10000
slowlog-max-len 256

# ==================== 延迟监控 ====================

# 启用延迟监控
latency-monitor-threshold 100












































