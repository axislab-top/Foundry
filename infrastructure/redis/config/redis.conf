# Redis 主配置文件
# 基于 Redis 7 默认配置，适用于通用场景

# ==================== 网络配置 ====================

# 监听端口
port 6379

# 绑定地址（空表示所有接口）
bind 0.0.0.0

# 保护模式（生产环境应启用）
protected-mode yes

# TCP 监听队列大小
tcp-backlog 511

# Unix socket 配置（可选）
# unixsocket /tmp/redis.sock
# unixsocketperm 700

# 客户端空闲超时（秒），0 表示不超时
timeout 0

# TCP keepalive 间隔（秒）
tcp-keepalive 300

# ==================== 通用配置 ====================

# 守护进程模式（Docker 中设为 no）
daemonize no

# 进程 PID 文件
pidfile /var/run/redis_6379.pid

# 日志级别：debug, verbose, notice, warning
loglevel notice

# 日志文件（stdout 表示输出到标准输出）
logfile ""

# 数据库数量
databases 16

# ==================== 快照配置（RDB） ====================

# 保存条件（格式：秒 键变更数）
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# 压缩 RDB 文件
rdbcompression yes

# RDB 文件校验和
rdbchecksum yes

# ==================== 复制配置 ====================

# 主从复制（未配置主节点）
# replicaof <masterip> <masterport>

# 主节点密码
# masterauth <master-password>

# ==================== 安全配置 ====================

# 密码认证（通过命令行或环境变量设置）
# requirepass foobared

# 重命名危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN_SAFE
rename-command DEBUG ""

# ==================== 内存管理 ====================

# 最大内存（0 表示不限制）
maxmemory 0

# 内存淘汰策略
# noeviction: 不淘汰，写入错误
# allkeys-lru: 所有键的 LRU
# volatile-lru: 过期键的 LRU
# allkeys-random: 所有键随机
# volatile-random: 过期键随机
# volatile-ttl: 过期键中 TTL 最小的
maxmemory-policy noeviction

# ==================== 持久化配置（AOF） ====================

# 启用 AOF
appendonly no

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 同步策略
# always: 每次写入都同步（最安全，最慢）
# everysec: 每秒同步（推荐）
# no: 由操作系统决定（最快，但可能丢失数据）
appendfsync everysec

# AOF 重写时是否同步
no-appendfsync-on-rewrite no

# AOF 重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ==================== 慢查询日志 ====================

# 慢查询阈值（微秒）
slowlog-log-slower-than 10000

# 慢查询日志长度
slowlog-max-len 128

# ==================== 延迟监控 ====================

# 延迟监控阈值（毫秒）
latency-monitor-threshold 0

# ==================== 事件通知 ====================

# 键空间通知（Keyspace notifications）
notify-keyspace-events ""

# ==================== 高级配置 ====================

# 哈希表配置
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表配置
list-max-ziplist-size -2
list-compress-depth 0

# 集合配置
set-max-intset-entries 512

# 有序集合配置
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog 配置
hll-sparse-max-bytes 3000

# 流配置
stream-node-max-bytes 4096
stream-node-max-entries 100

# 主动重哈希
activerehashing yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 客户端查询缓冲区限制
client-query-buffer-limit 1gb

# 协议限制
proto-max-bulk-len 512mb

# 频率限制
hz 10

# 动态调整 HZ
dynamic-hz yes

# AOF 重写时增量同步
aof-rewrite-incremental-fsync yes

# RDB 保存时增量同步
rdb-save-incremental-fsync yes












































