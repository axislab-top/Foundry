# Redis 开发环境配置文件
# 基于主配置文件，针对开发环境优化

# ==================== 持久化配置 ====================

# 开发环境禁用 RDB 快照（提高性能）
save ""

# 启用 AOF（更好的持久化）
appendonly yes

# AOF 同步策略：每秒同步（开发环境足够）
appendfsync everysec

# ==================== 内存管理 ====================

# 开发环境限制内存（1GB）
maxmemory 1gb

# 内存淘汰策略：所有键的 LRU
maxmemory-policy allkeys-lru

# ==================== 日志配置 ====================

# 开发环境使用详细日志
loglevel verbose

# ==================== 安全配置 ====================

# 开发环境可以禁用密码（仅用于本地开发）
# requirepass ""

# 开发环境允许重命名命令（便于调试）
# rename-command CONFIG "CONFIG_DEV"

# ==================== 性能优化 ====================

# 开发环境可以降低 HZ（减少 CPU 使用）
hz 5












































