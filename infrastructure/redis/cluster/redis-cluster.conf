# Redis Cluster 配置文件
# Redis Cluster 提供分布式、高可用的 Redis 解决方案

# 端口
port 6379

# 集群模式
cluster-enabled yes

# 集群配置文件（由 Redis 自动创建和维护）
cluster-config-file nodes.conf

# 节点超时时间（毫秒）
# 如果节点在指定时间内无法通信，将被标记为失败
cluster-node-timeout 15000

# 集群副本有效性因子
# 如果从节点与主节点断开连接的时间超过 (node-timeout * cluster-replica-validity-factor) + repl-ping-replica-period
# 则从节点不会被提升为主节点
cluster-replica-validity-factor 10

# 集群迁移屏障
# 主节点需要保留至少这个数量的从节点才能迁移到其他主节点
cluster-migration-barrier 1

# 集群要求的最小覆盖范围
# 如果覆盖的主节点百分比低于此值，集群将停止接受写入
cluster-require-full-coverage yes

# 持久化配置
appendonly yes
appendfsync everysec

# RDB 快照
save 900 1
save 300 10
save 60 10000

# 工作目录
dir /data

# 日志级别
loglevel notice












































