# Replace namespace, image, and storageClassName per cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foundry-runner
  namespace: foundry-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: foundry-runner-job-manager
  namespace: foundry-runner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create", "patch", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots", "volumesnapshotcontents"]
    verbs: ["get", "create", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: foundry-runner-job-manager
  namespace: foundry-runner
subjects:
  - kind: ServiceAccount
    name: foundry-runner
    namespace: foundry-runner
roleRef:
  kind: Role
  name: foundry-runner-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foundry-runner
  namespace: foundry-runner
  labels:
    app: foundry-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: foundry-runner
  template:
    metadata:
      labels:
        app: foundry-runner
    spec:
      serviceAccountName: foundry-runner
      containers:
        - name: runner
          image: ghcr.io/your-org/foundry-runner:latest
          ports:
            - containerPort: 3010
          env:
            - name: RMQ_URL
              valueFrom:
                secretKeyRef:
                  name: foundry-rmq
                  key: url
                  optional: true
            - name: RUNNER_EXEC_MODE
              value: "kubernetes"
            - name: RUNNER_K8S_NAMESPACE
              value: "foundry-runner"
            - name: RUNNER_GVISOR_RUNTIME_CLASS
              value: "gvisor"
            # P19：集群默认隔离运行时（gvisor | firecracker）；租户可经 DB 覆盖
            - name: RUNNER_DEFAULT_RUNTIME_CLASS
              value: "gvisor"
            # 可选：与 Hybrid 重命令路由共用同一 Firecracker RuntimeClass 名
            # - name: RUNNER_FIRECRACKER_RUNTIME_CLASS
            #   value: "firecracker"
            # Firecracker 节点隔离（JSON）；示例见 infrastructure/k8s/runner/runtimeclass-firecracker.yaml
            # - name: RUNNER_FIRECRACKER_NODE_SELECTOR_JSON
            #   value: '{"foundry.io/firecracker":"true"}'
            # - name: RUNNER_FIRECRACKER_TOLERATIONS_JSON
            #   value: '[{"key":"foundry.io/firecracker","operator":"Equal","value":"true","effect":"NoSchedule"}]'
            - name: API_RMQ_RPC_QUEUE
              value: "api-rpc-queue"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: foundry-runner
  namespace: foundry-runner
spec:
  selector:
    app: foundry-runner
  ports:
    - port: 3010
      targetPort: 3010
---
#
# Sprint 2 P11：NetworkPolicy 加固
# - 仅允许来自 Worker namespace 的入站（Runner RPC）
# - 如需允许 API 直连（例如调试），请显式追加 namespaceSelector
#
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: foundry-runner-ingress-from-worker-only
  namespace: foundry-runner
spec:
  podSelector:
    matchLabels:
      app: foundry-runner
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              foundry.io/namespace-role: worker
      ports:
        - protocol: TCP
          port: 3010
---
#
# Sprint 2 P11：ResourceQuota 加固
# 防止 Runner / Job 控制面被误配置打爆节点（实际 Job 限额仍由各 Job 模板决定）。
#
apiVersion: v1
kind: ResourceQuota
metadata:
  name: foundry-runner-rq
  namespace: foundry-runner
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
