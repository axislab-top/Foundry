# MinIO 开发环境配置覆盖

services:
  minio:
    ports:
      # 开发环境暴露所有端口
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - TZ=Asia/Shanghai
    # 开发环境不限制资源
    deploy: {}































