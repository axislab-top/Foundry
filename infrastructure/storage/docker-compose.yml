# MinIO 对象存储 Docker Compose 配置

services:
  minio:
    image: minio/minio:latest
    container_name: service-minio
    restart: unless-stopped
    networks:
      - service-network
    ports:
      - "${MINIO_PORT:-9000}:9000"  # API 端口
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console 端口
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - TZ=Asia/Shanghai
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  minio-data:
    driver: local

networks:
  service-network:
    external: true
    name: service-network































