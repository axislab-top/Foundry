# Logstash 管道配置
# 定义日志的输入、过滤和输出

# ==================== 输入配置 ====================

# HTTP 输入 - 接收来自应用的日志
input {
  http {
    port => 8080
    codec => json
    type => "application"
  }
  
  # TCP 输入 - 接收来自应用的日志
  tcp {
    port => 5000
    codec => json_lines
    type => "application"
  }
  
  # Beats 输入 - 接收来自 Filebeat 的日志
  beats {
    port => 5044
    type => "beats"
  }
  
  # 文件输入 - 读取应用日志文件
  file {
    path => "/var/log/apps/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "file"
    codec => json {
      charset => "UTF-8"
    }
  }
}

# ==================== 过滤配置 ====================

filter {
  # 解析 JSON 格式的日志
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }
  
  # 解析时间戳
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ss.SSSZ" ]
      target => "@timestamp"
    }
  }
  
  # 添加主机信息
  if ![host] {
    mutate {
      add_field => { "host" => "%{[@metadata][beat][hostname]}" }
    }
  }
  
  # 解析日志级别
  if [level] {
    mutate {
      uppercase => [ "level" ]
    }
  }
  
  # 添加服务标签
  if [service] {
    mutate {
      add_tag => [ "%{service}" ]
    }
  }
  
  # 解析 Docker 容器信息
  if [container] {
    mutate {
      add_field => { "container_name" => "%{container}" }
    }
  }
  
  # 错误日志特殊处理
  if [level] == "ERROR" or [level] == "FATAL" {
    mutate {
      add_tag => [ "error" ]
    }
  }
  
  # 移除敏感信息（可选）
  # mutate {
  #   gsub => [
  #     "message", "(?i)password[=:]\s*\S+", "password=***",
  #     "message", "(?i)token[=:]\s*\S+", "token=***"
  #   ]
  # }
}

# ==================== 输出配置 ====================

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    template_name => "logs"
    template => "/usr/share/logstash/templates/logs-template.json"
    template_overwrite => true
  }
  
  # 调试输出（可选，开发环境使用）
  # stdout {
  #   codec => rubydebug
  # }
}













































