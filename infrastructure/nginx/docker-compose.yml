# Nginx 负载均衡器 Docker Compose 配置
# 统一入口：静态前端 + 各后端反代

services:
  nginx:
    build:
      context: ../..
      dockerfile: infrastructure/nginx/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_PUBLIC_ORIGIN: ${VITE_PUBLIC_ORIGIN:-http://localhost}
    image: ${NGINX_IMAGE:-service-nginx:latest}
    container_name: service-nginx
    restart: unless-stopped
    networks:
      - service-network
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # 可选：本地调试 nginx 配置（不挂载则使用镜像内配置 + 内置静态资源）
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  nginx-logs:
    driver: local

networks:
  service-network:
    driver: bridge
