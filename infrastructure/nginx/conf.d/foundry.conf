# Foundry HTTP（健康检查 + 域名跳转 HTTPS）
# 业务路由见 foundry-locations.inc；HTTPS 见 foundry-ssl.conf

server {
    listen 80;
    server_name axislab.top www.axislab.top;

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 直连 IP / 未匹配域名：保留 HTTP 以便证书申请前调试（生产可删）
server {
    listen 80 default_server;
    server_name _;

    include /etc/nginx/conf.d/foundry-locations.inc;
}
