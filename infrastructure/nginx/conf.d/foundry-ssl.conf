# Foundry HTTPS — axislab.top
# 证书：/etc/nginx/ssl/cert.pem + key.pem（compose 挂载 infrastructure/nginx/ssl）

server {
    listen 443 ssl http2;
    server_name axislab.top www.axislab.top;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    include /etc/nginx/conf.d/ssl.conf;

    include /etc/nginx/conf.d/foundry-locations.inc;
}
