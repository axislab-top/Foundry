# Nginx 开发环境配置覆盖
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  nginx:
    container_name: service-nginx-dev
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      - TZ=Asia/Shanghai
      - NGINX_ENV=development
    volumes:
      # 开发时可热改 nginx 配置（静态资源仍在镜像内，改 UI 需 rebuild nginx 镜像）
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      gateway-service:
        condition: service_healthy
      api-service:
        condition: service_healthy
      worker-service:
        condition: service_healthy
      webhooks-service:
        condition: service_healthy
      logging-service:
        condition: service_healthy
    deploy: {}
