# Nginx 生产环境配置覆盖
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      # 生产环境只绑定到本地，通过外部负载均衡器访问
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    environment:
      - TZ=Asia/Shanghai
      - NGINX_ENV=production
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    # 生产环境启用资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    # 生产环境启用日志轮转
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # 生产环境建议启用健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s































