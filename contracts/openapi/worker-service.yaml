openapi: 3.0.3
info:
  title: Worker Service
  description: Worker 服务的 OpenAPI 规范
  version: 1.0.0
  contact:
    name: Worker Support

servers:
  - url: http://localhost:3004/api
    description: 本地开发环境
  - url: https://worker.example.com/api
    description: 生产环境

tags:
  - name: Health
    description: 健康检查接口
  - name: Tasks
    description: 任务管理接口（待实现）

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康检查
      description: 检查 Worker 服务的健康状态
      operationId: healthCheck
      responses:
        '200':
          description: 服务健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /tasks:
    post:
      tags:
        - Tasks
      summary: 提交任务
      description: 提交新的异步任务（待实现）
      operationId: submitTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTaskRequest'
      responses:
        '202':
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTask'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    get:
      tags:
        - Tasks
      summary: 查询任务列表
      description: 查询任务列表（待实现）
      operationId: listTasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed, cancelled]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePaginatedTasks'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: 获取任务详情
      description: 根据 ID 获取任务详情（待实现）
      operationId: getTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTask'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    delete:
      tags:
        - Tasks
      summary: 取消任务
      description: 取消正在执行的任务（待实现）
      operationId: cancelTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessage'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: 任务无法取消
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error, degraded]
        timestamp:
          type: string
          format: date-time
        service:
          type: string
        messageQueue:
          type: string
          enum: [connected, disconnected]

    SubmitTaskRequest:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          description: 任务类型
        payload:
          type: object
          description: 任务负载
        priority:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        delay:
          type: integer
          description: 延迟执行时间（毫秒）
          minimum: 0
        scheduledAt:
          type: string
          format: date-time
          description: 计划执行时间

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        payload:
          type: object
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        priority:
          type: integer
        result:
          type: object
          nullable: true
        error:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        retryCount:
          type: integer
        maxRetries:
          type: integer

    PaginatedTasks:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ApiResponseTask:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Task'
        timestamp:
          type: string
          format: date-time

    ApiResponsePaginatedTasks:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/PaginatedTasks'
        timestamp:
          type: string
          format: date-time

    ApiResponseMessage:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            details:
              type: object
            timestamp:
              type: string
              format: date-time
            path:
              type: string
        timestamp:
          type: string
          format: date-time
