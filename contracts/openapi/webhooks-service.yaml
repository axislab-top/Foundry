openapi: 3.0.3
info:
  title: Webhooks Service
  description: Webhooks 服务的 OpenAPI 规范
  version: 1.0.0
  contact:
    name: Webhooks Support

servers:
  - url: http://localhost:3003/api
    description: 本地开发环境
  - url: https://webhooks.example.com/api
    description: 生产环境

tags:
  - name: Health
    description: 健康检查接口
  - name: Webhooks
    description: Webhook 管理接口（待实现）

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康检查
      description: 检查 Webhooks 服务的健康状态
      operationId: healthCheck
      responses:
        '200':
          description: 服务健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /webhooks:
    get:
      tags:
        - Webhooks
      summary: 查询 Webhook 配置列表
      description: 查询所有 Webhook 配置（待实现）
      operationId: listWebhooks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePaginatedWebhooks'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    post:
      tags:
        - Webhooks
      summary: 创建 Webhook 配置
      description: 创建新的 Webhook 配置（待实现）
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWebhook'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /webhooks/{id}:
    get:
      tags:
        - Webhooks
      summary: 获取 Webhook 配置详情
      description: 根据 ID 获取 Webhook 配置详情（待实现）
      operationId: getWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWebhook'
        '404':
          description: Webhook 配置不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    patch:
      tags:
        - Webhooks
      summary: 更新 Webhook 配置
      description: 更新 Webhook 配置（待实现）
      operationId: updateWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWebhook'
        '404':
          description: Webhook 配置不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

    delete:
      tags:
        - Webhooks
      summary: 删除 Webhook 配置
      description: 删除 Webhook 配置（待实现）
      operationId: deleteWebhook
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMessage'
        '404':
          description: Webhook 配置不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error, degraded]
        timestamp:
          type: string
          format: date-time
        service:
          type: string

    CreateWebhookRequest:
      type: object
      required:
        - name
        - url
        - events
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        enabled:
          type: boolean
          default: true
        retryCount:
          type: integer
          minimum: 0
          maximum: 10
          default: 3
        timeout:
          type: integer
          minimum: 1000
          maximum: 60000
          default: 30000

    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        enabled:
          type: boolean
        retryCount:
          type: integer
          minimum: 0
          maximum: 10
        timeout:
          type: integer
          minimum: 1000
          maximum: 60000

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        retryCount:
          type: integer
        timeout:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedWebhooks:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    ApiResponseWebhook:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Webhook'
        timestamp:
          type: string
          format: date-time

    ApiResponsePaginatedWebhooks:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/PaginatedWebhooks'
        timestamp:
          type: string
          format: date-time

    ApiResponseMessage:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            details:
              type: object
            timestamp:
              type: string
              format: date-time
            path:
              type: string
        timestamp:
          type: string
          format: date-time
