# 可选：本地 Temporal（profile temporal）
# 合并：docker compose -f docker-compose.yml -f docker-compose.temporal.yml --profile temporal up -d
# UI: http://127.0.0.1:8088  前端口 7233 gRPC
#
# Worker 需设置：TASK_HEARTBEAT_SOURCE=temporal、WORKER_INTERNAL_API_SECRET
# temporal-worker 需：TEMPORAL_HEARTBEAT_COMPANY_IDS、同 secret

services:
  temporal-elasticsearch:
    image: elasticsearch:7.17.21
    profiles: ["temporal"]
    container_name: service-temporal-es
    networks:
      - service-network
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "127.0.0.1:19200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  temporal:
    image: temporalio/auto-setup:1.24.2
    profiles: ["temporal"]
    container_name: service-temporal
    depends_on:
      postgres:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    networks:
      - service-network
    ports:
      - "127.0.0.1:7233:7233"
      - "127.0.0.1:8088:8088"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PWD=${DB_PASSWORD:-postgres}
      - POSTGRES_SEEDS=${DB_HOST:-postgres}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8088 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s
