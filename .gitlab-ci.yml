# 部署到测试环境
deploy:test:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ENVIRONMENT=test \
      DOCKER_REGISTRY=$CI_REGISTRY \
      DOCKER_IMAGE_VERSION=$CI_COMMIT_SHORT_SHA \
      bash ci-cd/scripts/deploy.sh
  environment:
    name: test
    url: https://test.example.com
  only:
    - develop

# 部署到生产环境
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ENVIRONMENT=production \
      DOCKER_REGISTRY=$CI_REGISTRY \
      DOCKER_IMAGE_VERSION=$CI_COMMIT_SHORT_SHA \
      bash ci-cd/scripts/deploy.sh
  environment:
    name: production
    url: https://api.example.com
  when: manual
  only:
    - main
    - tags






























