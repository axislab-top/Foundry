name: 功能建议
description: 提出一个新功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述清楚你的需求和使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个功能解决什么问题？
      placeholder: 例如：目前 Agent 只能通过群聊交互，无法直接在任务面板中发起对话...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何解决这个问题？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有没有其他替代方案？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - Nice to have（锦上添花）
        - Important（重要）
        - Critical（关键）
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何额外的上下文、截图、参考链接等
