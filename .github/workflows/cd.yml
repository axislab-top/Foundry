name: CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - test
          - production

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.27.0'
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  IMAGE_PREFIX: service

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-env.outputs.version }}
    steps:
      - name: Set environment and version
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=test" >> $GITHUB_OUTPUT
          fi
          
          if [ -z "${{ steps.set-env.outputs.version }}" ]; then
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

  deploy-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'test'
    environment:
      name: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to test environment
        run: |
          ENVIRONMENT=test \
          DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }} \
          DOCKER_IMAGE_VERSION=${{ needs.determine-environment.outputs.version }} \
          bash ci-cd/scripts/deploy.sh

  deploy-production:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to production environment
        run: |
          ENVIRONMENT=production \
          DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }} \
          DOCKER_IMAGE_VERSION=${{ needs.determine-environment.outputs.version }} \
          bash ci-cd/scripts/deploy.sh

      - name: Health check
        run: |
          sleep 30
          # Add health check logic here
          echo "Health check completed"






























